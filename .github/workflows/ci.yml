name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npm run test:run
      # No bloqueante hasta dejar el baseline (44E/8W) a 0 — hito 6 del backlog
      - name: Lint (informativo)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
